<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Internships — Career Navigator</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><span>🎯</span> Career Navigator</div>
  <div class="nav-links">
    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/internships-page" class="active">💼 Internships</a>
    <a href="/careers-page">🚀 Careers</a>
    <a href="/scholarships-page">🎓 Scholarships</a>
  </div>
  <div class="nav-user">
    <div class="avatar" id="avatarText">S</div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="dashboard">
  <div class="page-title">💼 Internships</div>
  <div class="page-sub">Apne liye best internship dhundho — filter karo aur apply karo!</div>

  <!-- Filters -->
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="🔍 Company ya role search karo..." oninput="filterChange()" class="search-input"/>
    <select id="domainFilter" onchange="filterChange()">
      <option value="">All Domains</option>
      <option>IT/Software</option><option>Data Science</option><option>Marketing</option>
      <option>Finance</option><option>Operations</option><option>Healthcare</option>
      <option>Engineering</option><option>Design</option><option>Research</option><option>Banking</option>
    </select>
    <select id="modeFilter" onchange="filterChange()">
      <option value="">All Modes</option>
      <option>Remote</option><option>On-site</option><option>Hybrid</option>
    </select>
    <select id="paidFilter" onchange="filterChange()">
      <option value="">Paid & Unpaid</option>
      <option value="true">Paid Only</option>
      <option value="false">Unpaid Only</option>
    </select>
    <button onclick="resetFilters()" class="reset-btn">Reset</button>
  </div>

  <!-- Stats Row -->
  <div style="display:flex;gap:12px;margin-bottom:20px">
    <div class="mini-badge blue-badge" id="totalCount">Loading...</div>
    <div class="mini-badge green-badge">✅ Verified Companies</div>
    <div class="mini-badge orange-badge">🔥 Updated Today</div>
  </div>

  <!-- Cards Grid -->
  <div id="cardsGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px"></div>

  <!-- Pagination -->
  <div id="pagination" style="display:flex;justify-content:center;gap:8px;margin-top:28px"></div>
</div>

<style>
.filter-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;background:white;padding:16px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.search-input{flex:1;min-width:200px;padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:14px;outline:none}
.search-input:focus{border-color:#667eea}
.filter-bar select{padding:10px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:13px;outline:none;cursor:pointer;color:#4a5568}
.filter-bar select:focus{border-color:#667eea}
.reset-btn{padding:10px 18px;background:#f0f4ff;color:#667eea;border:2px solid #667eea;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.mini-badge{font-size:12px;padding:6px 14px;border-radius:20px;font-weight:600}
.blue-badge{background:#ebf8ff;color:#2c5282}
.green-badge{background:#f0fff4;color:#276749}
.orange-badge{background:#fffaf0;color:#c05621}
.intern-card{background:white;border-radius:14px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);transition:.2s;border:1px solid #f0f4ff;display:flex;flex-direction:column}
.intern-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,.12);border-color:#667eea}
.card-company{font-size:13px;color:#718096;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.card-role{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:12px}
.card-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.ctag{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500}
.ctag-blue{background:#ebf8ff;color:#2c5282}
.ctag-green{background:#f0fff4;color:#276749}
.ctag-orange{background:#fffaf0;color:#c05621}
.ctag-purple{background:#faf5ff;color:#6b46c1}
.ctag-gray{background:#f7fafc;color:#4a5568}
.card-stipend{font-size:18px;font-weight:700;color:#276749;margin-bottom:4px}
.card-deadline{font-size:11px;color:#a0aec0;margin-bottom:14px}
.apply-btn{display:block;text-align:center;padding:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;cursor:pointer;border:none;width:100%;margin-top:auto}
.apply-btn:hover{opacity:.9}
.page-btn{padding:8px 14px;border:2px solid #e2e8f0;border-radius:8px;background:white;cursor:pointer;font-size:13px;font-weight:600;color:#4a5568;transition:.2s}
.page-btn:hover,.page-btn.active{background:#667eea;color:white;border-color:#667eea}
.company-type-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#f7fafc;color:#718096;font-weight:500}
.ppo-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#faf5ff;color:#6b46c1;font-weight:600}
</style>

<script src="/static/js/main.js"></script>
<script>
const token = getToken();
if (!token) window.location.href = '/login';
const s = getStudent();
if (s) { document.getElementById('avatarText').textContent = (s.full_name||'S').charAt(0).toUpperCase(); }

let currentPage = 1;
const perPage   = 12;
let totalPages  = 1;

async function loadInternships(page=1) {
  const domain = document.getElementById('domainFilter').value;
  const mode   = document.getElementById('modeFilter').value;
  const paid   = document.getElementById('paidFilter').value;
  const search = document.getElementById('searchInput').value.toLowerCase();

  let url = `/internships?page=${page}&per_page=${perPage}`;
  if (domain) url += `&domain=${encodeURIComponent(domain)}`;
  if (mode)   url += `&mode=${encodeURIComponent(mode)}`;
  if (paid)   url += `&is_paid=${paid}`;

  document.getElementById('cardsGrid').innerHTML = '<div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading internships...</div>';

  const res  = await fetch(url);
  const data = await res.json();
  let items  = data.data || [];

  if (search) items = items.filter(i =>
    i.company_name.toLowerCase().includes(search) ||
    i.role_title.toLowerCase().includes(search) ||
    (i.domain||'').toLowerCase().includes(search)
  );

  totalPages = Math.ceil(data.total / perPage);
  document.getElementById('totalCount').textContent = `📊 ${data.total.toLocaleString('en-IN')} Internships`;

  if (!items.length) {
    document.getElementById('cardsGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:60px;color:#a0aec0"><div style="font-size:48px;margin-bottom:12px">😕</div><div style="font-size:16px;font-weight:600">Koi internship nahi mili</div><div style="font-size:13px;margin-top:8px">Filters change karo ya reset karo</div></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  document.getElementById('cardsGrid').innerHTML = items.map(i => `
    <div class="intern-card">
      <div class="card-company">
        <span>🏢 ${i.company_name}</span>
        <span class="company-type-badge">${i.mode||''}</span>
        ${i.ppo_available ? '<span class="ppo-badge">PPO</span>' : ''}
      </div>
      <div class="card-role">${i.role_title}</div>
      <div class="card-tags">
        <span class="ctag ctag-blue">📍 ${i.location||'Remote'}</span>
        <span class="ctag ctag-orange">⏱ ${i.duration_months} months</span>
        <span class="ctag ctag-purple">🏷 ${i.domain||''}</span>
        <span class="ctag ctag-gray">⭐ ${i.rating||0}</span>
      </div>
      <div class="card-stipend">${i.stipend_per_month > 0 ? '₹'+i.stipend_per_month.toLocaleString('en-IN')+'/month' : 'Unpaid'}</div>
      <div class="card-deadline">📅 Deadline: ${i.application_deadline || 'Open'}</div>
      <button class="apply-btn" onclick="applyNow('${i.internship_id}','${i.company_name}','${i.role_title}')">Apply Now →</button>
    </div>`).join('');

  renderPagination(data.total, page);
}

function renderPagination(total, current) {
  const pages = Math.ceil(total / perPage);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  if (current > 1) html += `<button class="page-btn" onclick="goPage(${current-1})">← Prev</button>`;
  const start = Math.max(1, current-2);
  const end   = Math.min(pages, current+2);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button><span style="padding:8px">...</span>`;
  for (let i = start; i <= end; i++)
    html += `<button class="page-btn ${i===current?'active':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < pages) html += `<span style="padding:8px">...</span><button class="page-btn" onclick="goPage(${pages})">${pages}</button>`;
  if (current < pages) html += `<button class="page-btn" onclick="goPage(${current+1})">Next →</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; loadInternships(p); window.scrollTo(0,0); }
function filterChange() { currentPage = 1; loadInternships(1); }
function resetFilters() {
  document.getElementById('domainFilter').value = '';
  document.getElementById('modeFilter').value   = '';
  document.getElementById('paidFilter').value   = '';
  document.getElementById('searchInput').value  = '';
  loadInternships(1);
}

function applyNow(id, company, role) {
  alert(`✅ Application submitted!\n\nCompany: ${company}\nRole: ${role}\n\nReal application system coming soon!`);
}

loadInternships(1);
</script>
</body>
</html>
