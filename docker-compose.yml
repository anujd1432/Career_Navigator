version: "3.9"

services:

  # ── PostgreSQL Database ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: career_navigator_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yourpassword}
      POSTGRES_DB: career_navigator
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI App ─────────────────────────────────────────────────
  app:
    build: .
    container_name: career_navigator_app
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-yourpassword}@postgres:5432/career_navigator
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
      - ./data:/app/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── pgAdmin (Database GUI) ──────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: career_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@career.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pg_data: