<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — Career Navigator</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">🎯</div>
      <h1>Career Navigator</h1>
      <p>First-Gen Students ke liye<br/>AI-Powered Career Guidance</p>
    </div>
    <div class="features">
      <div class="feature-item">🔐 Secure password reset</div>
      <div class="feature-item">📧 OTP email pe aayega</div>
      <div class="feature-item">⏰ 15 minutes valid rahega</div>
      <div class="feature-item">✅ Turant access milega</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div style="text-align:center;margin-bottom:24px">
        <div style="font-size:56px">🔐</div>
        <h2>Password Bhool Gaye?</h2>
        <p class="auth-sub">Email daalo — OTP bhejenge</p>
      </div>
      <div id="error-msg" class="alert alert-error" style="display:none"></div>
      <div id="success-msg" class="alert alert-success" style="display:none"></div>

      <!-- Step 1: Email -->
      <div id="step1">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="apna@email.com" required/>
        </div>
        <button class="btn-primary" id="sendBtn" onclick="sendOTP()">OTP Bhejo 📧</button>
      </div>

      <!-- Step 2: OTP + New Password -->
      <div id="step2" style="display:none">
        <p style="font-size:13px;color:#718096;margin-bottom:16px">OTP bheja gaya: <strong id="email-show"></strong></p>
        <div class="otp-inputs" style="margin-bottom:20px">
          <input class="otp-box" type="text" maxlength="1" id="o1" oninput="otpMove(this,'o2')" onkeydown="otpBack(event,this,'')"/>
          <input class="otp-box" type="text" maxlength="1" id="o2" oninput="otpMove(this,'o3')" onkeydown="otpBack(event,this,'o1')"/>
          <input class="otp-box" type="text" maxlength="1" id="o3" oninput="otpMove(this,'o4')" onkeydown="otpBack(event,this,'o2')"/>
          <input class="otp-box" type="text" maxlength="1" id="o4" oninput="otpMove(this,'o5')" onkeydown="otpBack(event,this,'o3')"/>
          <input class="otp-box" type="text" maxlength="1" id="o5" oninput="otpMove(this,'o6')" onkeydown="otpBack(event,this,'o4')"/>
          <input class="otp-box" type="text" maxlength="1" id="o6" oninput="otpMove(this,'')"   onkeydown="otpBack(event,this,'o5')"/>
        </div>
        <div class="form-group">
          <label>Naya Password</label>
          <div class="input-eye">
            <input type="password" id="new_password" placeholder="Min 8 characters"/>
            <span onclick="togglePass('new_password')" class="eye-btn">👁</span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-eye">
            <input type="password" id="confirm_password" placeholder="••••••••"/>
            <span onclick="togglePass('confirm_password')" class="eye-btn">👁</span>
          </div>
        </div>
        <button class="btn-primary" id="resetBtn" onclick="resetPassword()">Password Reset Karo 🔐</button>
      </div>

      <div class="divider"><span>ya</span></div>
      <p class="auth-footer"><a href="/login">← Wapas Login</a></p>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
let resetToken = '';
function otpMove(el, nextId) {
  el.value = el.value.replace(/[^0-9]/g,'');
  if (el.value && nextId) document.getElementById(nextId).focus();
}
function otpBack(e, el, prevId) {
  if (e.key==='Backspace' && !el.value && prevId) document.getElementById(prevId).focus();
}
async function sendOTP() {
  const email = document.getElementById('email').value;
  if (!email) return showError('Email daalo!');
  const btn = document.getElementById('sendBtn');
  btn.textContent = 'Bhej raha hoon...'; btn.disabled = true;
  hideMessages();
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email})
    });
    const data = await res.json();
    if (res.ok) {
      resetToken = data.token;
      document.getElementById('email-show').textContent = email;
      document.getElementById('step1').style.display = 'none';
      document.getElementById('step2').style.display = 'block';
      showSuccess('OTP bheja gaya!');
      if (data.debug_otp) {
        [...data.debug_otp].forEach((d,i) => {
          const el = document.getElementById('o'+(i+1));
          if(el) el.value = d;
        });
      }
    } else {
      showError(data.detail || 'Error!');
      btn.textContent = 'OTP Bhejo 📧'; btn.disabled = false;
    }
  } catch(e) { showError('Server error!'); btn.textContent = 'OTP Bhejo 📧'; btn.disabled = false; }
}
async function resetPassword() {
  const otp = ['o1','o2','o3','o4','o5','o6'].map(id=>document.getElementById(id).value).join('');
  const np = document.getElementById('new_password').value;
  const cp = document.getElementById('confirm_password').value;
  if (otp.length !== 6) return showError('6-digit OTP daalo!');
  if (!np || np.length < 8) return showError('Password kam se kam 8 characters ka hona chahiye!');
  if (np !== cp) return showError('Passwords match nahi kar rahe!');
  const btn = document.getElementById('resetBtn');
  btn.textContent = 'Reset ho raha hai...'; btn.disabled = true;
  hideMessages();
  try {
    const res = await fetch('/api/auth/reset-password', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({token: resetToken, new_password: np})
    });
    const data = await res.json();
    if (res.ok) {
      showSuccess('Password reset successful! Login karein. 🎉');
      setTimeout(() => window.location.href = '/login', 2000);
    } else {
      showError(data.detail || 'Error!');
      btn.textContent = 'Password Reset Karo 🔐'; btn.disabled = false;
    }
  } catch(e) { showError('Server error!'); btn.textContent = 'Password Reset Karo 🔐'; btn.disabled = false; }
}
</script>
</body>
</html>
