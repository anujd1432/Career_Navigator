<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Career Navigator</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="auth-body">
<div class="auth-container">
  <div class="auth-left">
    <div class="brand">
      <div class="brand-icon">🎯</div>
      <h1>Career Navigator</h1>
      <p>First-Gen Students ke liye<br/>AI-Powered Career Guidance</p>
    </div>
    <div class="features">
      <div class="feature-item">✅ AI Career Assessment</div>
      <div class="feature-item">✅ Internship Matching</div>
      <div class="feature-item">✅ Scholarship Finder</div>
      <div class="feature-item">✅ Resume Builder</div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <h2>Welcome Back! 👋</h2>
      <p class="auth-sub">Apne account mein login karo</p>
      <div id="error-msg" class="alert alert-error" style="display:none"></div>
      <div id="success-msg" class="alert alert-success" style="display:none"></div>

      <!-- Google Login -->
      <a href="/api/auth/google" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" style="margin-right:10px"/>
        Google se Login karo
      </a>
      <div class="divider"><span>ya email se</span></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="apna@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-eye">
            <input type="password" id="password" placeholder="••••••••" required/>
            <span onclick="togglePass('password')" class="eye-btn">👁</span>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"/> Remember me
          </label>
          <a href="/forgot-password" class="forgot-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">Login</button>
      </form>

      <div class="divider"><span>ya</span></div>
      <p class="auth-footer">Account nahi hai? <a href="/register">Register karo</a></p>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
<script>
// Check URL params for errors
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('error')) showError(urlParams.get('error'));

document.getElementById('loginForm').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  btn.textContent = 'Logging in...'; btn.disabled = true;
  hideMessages();
  try {
    const res = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (res.ok) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('student', JSON.stringify(data.student));
      showSuccess('Login successful! 🎉');
      setTimeout(() => window.location.href = '/dashboard', 1000);
    } else {
      showError(data.detail || 'Invalid email or password');
      btn.textContent = 'Login'; btn.disabled = false;
    }
  } catch(e) {
    showError('Server error. Try again!');
    btn.textContent = 'Login'; btn.disabled = false;
  }
});

// Handle Google OAuth token from URL
const token = urlParams.get('token');
const name = urlParams.get('name');
if (token) {
  localStorage.setItem('token', token);
  if (name) localStorage.setItem('student', JSON.stringify({full_name: name}));
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
